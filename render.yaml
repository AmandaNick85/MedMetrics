services:
  # 1. FRONTEND (Site Estático)
  - type: web
    name: medmetrics-frontend
    runtime: node
    repo: https://github.com/AmandaNick85/MedMetrics.git
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDirectory: frontend
    envVars:
      - key: VITE_API_AUTH_URL
        fromService:
          type: web
          name: medmetrics-auth-service
          property: url
      - key: VITE_API_ANALYTICS_URL
        fromService:
          type: web
          name: medmetrics-analytics-service
          property: url

  # 2. AUTH-SERVICE (API Node/Express)
  - type: web
    name: medmetrics-auth-service
    runtime: node
    repo: https://github.com/AmandaNick85/MedMetrics.git
    plan: free
    buildCommand: npm install
    startCommand: npm start
    rootDirectory: auth-service
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: postgresql://neondb_owner:npg_6yOm5dUbuWkR@ep-shiny-heart-ac8nuwgn.sa-east-1.aws.neon.tech/neondb?sslmode=require
      - key: JWT_SECRET
        generateValue: true # <-- O Render gera uma chave segura de forma automática para você

  # 3. ANALYTICS-SERVICE (API Baseada no seu Dockerfile)
  - type: web
    name: medmetrics-analytics-service
    runtime: docker # <-- O Render vai ler o seu Dockerfile automaticamente!
    repo: https://github.com/AmandaNick85/MedMetrics.git
    plan: free
    rootDirectory: analytics-service
    envVars:
      - key: PORT
        value: 3002
      - key: MONGO_URI
        sync: mongodb+srv://analista:medmetrics@medmetrics-analytics.fgxrwav.mongodb.net/?appName=MedMetrics-Analytics
      - key: JWT_SECRET
        generateValue: true